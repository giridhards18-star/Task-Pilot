{% extends "base.html" %}

{% block title %}Register - Task Pilot{% endblock %}

{% block nav %}
    <a href="/login" class="btn btn-secondary btn-small">
        <i class="fas fa-sign-in-alt"></i> Login
    </a>
{% endblock %}

{% block content %}
<div class="hero-panel">
    <section class="auth-panel panel">
        <div class="panel-inner">
            <div class="section-title">
                <div>
                    <h2>Create Account</h2>
                    <p class="subtext">Build your task workspace and stay ahead of your priorities.</p>
                </div>
                <span class="badge">Sign up</span>
            </div>

            <form method="POST" id="register-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required minlength="3">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="register-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <p class="form-footer">Already have an account? <a href="/login">Sign in here</a></p>
        </div>
    </section>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (password !== confirmPassword) {
        e.preventDefault();
        TaskPilot.showAlert('Passwords do not match!', 'error');
        return;
    }

    const btn = document.getElementById('register-btn');
    TaskPilot.toggleLoading(btn, true);
});

// Password confirmation feedback
document.getElementById('confirm-password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const confirmPassword = this.value;

    if (confirmPassword && password !== confirmPassword) {
        this.classList.add('invalid');
        this.classList.remove('valid');
    } else if (confirmPassword && password === confirmPassword) {
        this.classList.add('valid');
        this.classList.remove('invalid');
    } else {
        this.classList.remove('valid', 'invalid');
    }
});
</script>
{% endblock %}
