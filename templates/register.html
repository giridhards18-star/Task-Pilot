{% extends "base.html" %}

{% block title %}Register - Task Pilot{% endblock %}

{% block nav %}
    <a href="/login" class="btn btn-secondary btn-small">
        <i class="fas fa-sign-in-alt"></i> Login
    </a>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-title">
        <h2><i class="fas fa-user-plus"></i> Create Account</h2>
        <p>Join Task Pilot to start organizing your tasks</p>
    </div>

    <form method="POST" id="register-form">
        <div class="form-group">
            <label class="form-label" for="username">
                <i class="fas fa-user"></i> Username
            </label>
            <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required minlength="3">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">
                <i class="fas fa-lock"></i> Password
            </label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required minlength="6">
        </div>

        <div class="form-group">
            <label class="form-label" for="confirm-password">
                <i class="fas fa-lock"></i> Confirm Password
            </label>
            <input type="password" id="confirm-password" class="form-input" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="register-btn">
            <i class="fas fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="form-footer">
        <p>Already have an account? <a href="/login">Sign in here</a></p>
    </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (password !== confirmPassword) {
        e.preventDefault();
        TaskPilot.showAlert('Passwords do not match!', 'error');
        return;
    }

    const btn = document.getElementById('register-btn');
    TaskPilot.toggleLoading(btn, true);
});

// Real-time password confirmation validation
document.getElementById('confirm-password').addEventListener('input', function() {
    const password = document.getElementById('password').value;
    const confirmPassword = this.value;

    if (confirmPassword && password !== confirmPassword) {
        this.classList.add('invalid');
        this.classList.remove('valid');
    } else if (confirmPassword && password === confirmPassword) {
        this.classList.add('valid');
        this.classList.remove('invalid');
    } else {
        this.classList.remove('valid', 'invalid');
    }
});
</script>
{% endblock %}
