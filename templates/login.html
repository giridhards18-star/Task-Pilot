{% extends "base.html" %}

{% block title %}Login - Task Pilot{% endblock %}

{% block nav %}
    <a href="/register" class="btn btn-secondary btn-small">
        <i class="fas fa-user-plus"></i> Register
    </a>
{% endblock %}

{% block content %}
<div class="hero-panel">
    <section class="auth-panel panel">
        <div class="panel-inner">
            <div class="section-title">
                <div>
                    <h2>Welcome Back</h2>
                    <p class="subtext">Sign in to access your task dashboard and stay productive.</p>
                </div>
                <span class="badge">Fast login</span>
            </div>

            <form method="POST" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <p class="form-footer">Don't have an account? <a href="/register">Create one</a></p>
        </div>
    </section>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    const btn = document.getElementById('login-btn');
    TaskPilot.toggleLoading(btn, true);
});
</script>
{% endblock %}
